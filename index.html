<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c10;
  --s1: #13131a;
  --s2: #1c1c27;
  --border: #26263a;
  --green: #22c55e;
  --red: #ef4444;
  --gold: #f59e0b;
  --blue: #60a5fa;
  --text: #ededf5;
  --muted: #6b6b90;
  --r: 14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;}
.wrap{width:100%;max-width:680px;padding:28px 16px 60px;}

/* BG blobs */
.blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;opacity:.45;}
.blob1{width:380px;height:380px;background:radial-gradient(circle,rgba(34,197,94,.18),transparent 70%);top:-100px;left:-80px;}
.blob2{width:300px;height:300px;background:radial-gradient(circle,rgba(239,68,68,.15),transparent 70%);bottom:-80px;right:-60px;}

.inner{position:relative;z-index:1;}

/* HEADER */
header{text-align:center;margin-bottom:32px;}
header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.8rem,5vw,2.8rem);letter-spacing:-1px;background:linear-gradient(135deg,#ededf5 40%,#6b6b90);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
header p{color:var(--muted);font-size:.9rem;margin-top:5px;font-weight:300;}

/* SCOREBAR */
.scorebar{display:flex;gap:10px;justify-content:center;margin-bottom:24px;flex-wrap:wrap;}
.score-chip{padding:6px 18px;border-radius:20px;font-size:.82rem;font-weight:600;border:1px solid;letter-spacing:.3px;}
.chip-round{border-color:var(--blue);color:var(--blue);background:rgba(96,165,250,.08);}
.chip-ok{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.08);}
.chip-bad{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.08);}

/* PROGRESS */
.prog-wrap{margin-bottom:28px;}
.prog-label{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:7px;font-weight:500;}
.prog-bar{height:4px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:3px;transition:width .4s ease;}

/* CARD */
.question-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:28px 24px;margin-bottom:20px;animation:fadeUp .35s ease;}
.q-meta{display:flex;gap:10px;align-items:center;margin-bottom:18px;}
.q-num{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.q-topic{font-family:'Syne',sans-serif;font-size:clamp(1.15rem,3vw,1.5rem);font-weight:700;line-height:1.3;color:var(--text);}

/* STEP 1 — R or F */
.step-label{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px;}
.rf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:0;}
.rf-btn{padding:18px 12px;border-radius:12px;border:2px solid var(--border);background:var(--s2);cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:.5px;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:6px;}
.rf-btn span.icon{font-size:1.6rem;}
.rf-btn span.lbl{font-size:.78rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.rf-btn.btn-r{color:var(--green);}
.rf-btn.btn-r:hover{border-color:var(--green);background:rgba(34,197,94,.1);}
.rf-btn.btn-f{color:var(--red);}
.rf-btn.btn-f:hover{border-color:var(--red);background:rgba(239,68,68,.1);}
.rf-btn.selected-correct{border-color:var(--green);background:rgba(34,197,94,.12);}
.rf-btn.selected-wrong{border-color:var(--red);background:rgba(239,68,68,.12);}
.rf-btn:disabled{cursor:default;opacity:.5;}

/* STEP 2 — Answer options */
.step2{margin-top:20px;display:none;}
.step2.visible{display:block;animation:fadeUp .3s ease;}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:480px){.options-grid{grid-template-columns:1fr;}}
.opt-btn{padding:14px 14px;border-radius:11px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:400;text-align:left;cursor:pointer;transition:all .18s;line-height:1.4;}
.opt-btn:hover:not(:disabled){border-color:var(--muted);background:#20202e;}
.opt-btn.correct{border-color:var(--green);background:rgba(34,197,94,.1);color:var(--green);font-weight:500;}
.opt-btn.wrong{border-color:var(--red);background:rgba(239,68,68,.1);color:var(--red);}
.opt-btn:disabled{cursor:default;}

/* FEEDBACK */
.feedback{text-align:center;min-height:26px;font-size:.88rem;font-weight:600;margin-top:14px;letter-spacing:.2px;transition:all .2s;}
.fb-ok{color:var(--green);}
.fb-bad{color:var(--red);}

/* NEXT BTN */
.next-btn{display:none;width:100%;padding:14px;margin-top:14px;border-radius:12px;border:1px solid rgba(245,158,11,.35);background:rgba(245,158,11,.08);color:var(--gold);font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:all .2s;letter-spacing:.3px;}
.next-btn:hover{background:rgba(245,158,11,.15);}
.next-btn.vis{display:block;}

/* RESULT */
.result{display:none;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:44px 28px;text-align:center;animation:fadeUp .4s ease;}
.result.vis{display:block;}
.result-icon{font-size:3.2rem;margin-bottom:14px;}
.result-title{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;margin-bottom:6px;}
.result-pct{font-family:'Syne',sans-serif;font-size:4rem;font-weight:800;background:linear-gradient(135deg,var(--green),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:12px 0;}
.result-sub{color:var(--muted);font-size:.9rem;margin-bottom:28px;}
.restart-btn{padding:13px 36px;border-radius:12px;border:1px solid var(--gold);background:rgba(245,158,11,.08);color:var(--gold);font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:all .2s;letter-spacing:.3px;}
.restart-btn:hover{background:rgba(245,158,11,.16);}

/* QUIZ AREA */
#quiz-area{}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="wrap">
<div class="inner">

<header>
  <h1>Deutsch Quiz</h1>
  <p>10 Fragen gemischt · Richtig oder Falsch → dann die Antwort</p>
</header>

<div class="scorebar">
  <div class="score-chip chip-round" id="chip-round">Runde 1</div>
  <div class="score-chip chip-ok" id="chip-ok">✅ 0</div>
  <div class="score-chip chip-bad" id="chip-bad">❌ 0</div>
</div>

<div class="prog-wrap">
  <div class="prog-label">
    <span id="prog-text">Frage 1 von 10</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div id="quiz-area">
  <!-- question injected here -->
</div>

<div class="result" id="result">
  <div class="result-icon" id="res-icon">🎉</div>
  <div class="result-title">Runde beendet!</div>
  <div class="result-pct" id="res-pct">80%</div>
  <div class="result-sub" id="res-sub">Du hast 8 von 10 richtig.</div>
  <button class="restart-btn" onclick="nextRound()">▶ Nächste Runde</button>
</div>

</div>
</div>

<script>
const ALL = [
  {type:'R',nr:'01',topic:'Hörbuch',answer:'Entspannen'},
  {type:'R',nr:'02',topic:'Essverhalten',answer:'Kochen zusammen'},
  {type:'R',nr:'03',topic:'Wochenende Zeitung',answer:'Andere Medien ergänzt'},
  {type:'R',nr:'04',topic:'Handy in der Freizeit',answer:'Immer mit dem Handy beschäftigen'},
  {type:'R',nr:'05',topic:'Rauchen / Zigaretten',answer:'Reaktion / sinken'},
  {type:'R',nr:'06',topic:'Wichtig im Leben',answer:'Horizont'},
  {type:'R',nr:'08',topic:'Verein (keine Zeit)',answer:'Die Tochter hat Hausaufgaben'},
  {type:'R',nr:'09',topic:'Arbeitszeit',answer:'Kreativ'},
  {type:'R',nr:'10',topic:'Freundlichkeit',answer:'Beruf'},
  {type:'R',nr:'11',topic:'Fantasie im Arbeit',answer:'Aufgabe lösen'},
  {type:'R',nr:'12',topic:'Verkaufsstrategie',answer:'Erleichterte Verhandlung'},
  {type:'R',nr:'13',topic:'Reden über Ausflug',answer:'Das Zelt hat gute Qualität'},
  {type:'R',nr:'14',topic:'Art des Essens ändern',answer:'Nimmt Kochkurse teil'},
  {type:'R',nr:'15',topic:'Reiseblog',answer:'Über ihre Tiere'},
  {type:'R',nr:'16',topic:'Spielwarenhandlung',answer:'Geschlossen'},
  {type:'R',nr:'17',topic:'Lottospiel',answer:'Süchtig steigert'},
  {type:'R',nr:'18',topic:'Stadt und Dorf',answer:'Sozialleben'},
  {type:'F',nr:'01',topic:'Zucker Konsum, WHO',answer:'Essgewohnheiten verändern'},
  {type:'F',nr:'02',topic:'Wohltätigkeitsorganisation',answer:'Mobiles Krankenhaus'},
  {type:'F',nr:'03',topic:'2 Frauen kennen sich',answer:'Wollte Zeit für Reden'},
  {type:'F',nr:'04',topic:'Stricken mit Händen',answer:'Entspannen während der Arbeit'},
  {type:'F',nr:'05',topic:'Meerfahrt / Seereise',answer:'In Ruhe den See betrachten'},
  {type:'F',nr:'06',topic:'Verhältnis alte Menschen',answer:'Angenehme Person'},
  {type:'F',nr:'07',topic:'Behandlung',answer:'Das Verhalten ist richtig'},
  {type:'F',nr:'08',topic:'Regel in der Gesellschaft',answer:'Konkurrenz zu groß'},
  {type:'F',nr:'09',topic:'Deutsche Sprache verändern',answer:'Langer Zeitraum ändern'},
  {type:'F',nr:'10',topic:'Erfahrung erste Arbeitstag',answer:'Erfolgreich'},
  {type:'F',nr:'11',topic:'Praktikum Erfahrung',answer:'Selbst etwas zu schreiben'},
  {type:'F',nr:'12',topic:'Kindergeburtstag Party',answer:'Allein organisieren'},
  {type:'F',nr:'13',topic:'Glücksspiel',answer:'Süchtig steigert'},
  {type:'F',nr:'14',topic:'Prinzip der Natur',answer:'Gesellschaft Gleichheit'},
  {type:'F',nr:'15',topic:'Französische Sprache',answer:'Aufenthalt ins Ausland'},
  {type:'F',nr:'16',topic:'Lebenshaltung Stadt',answer:'Bieten Wohnraum zu angemessenen Preisen'},
];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// State
let pool = shuffle(ALL);
let roundCards = [];
let qi = 0; // question index in round
let correctCount = 0;
let wrongCount = 0;
let roundNum = 1;
let rfAnswered = false;
let rfCorrect = false;
let answered = false;

function startRound(){
  if(pool.length === 0) pool = shuffle(ALL);
  // take 10 (or remaining)
  roundCards = pool.splice(0, 10);
  qi = 0; correctCount = 0; wrongCount = 0;
  document.getElementById('result').classList.remove('vis');
  document.getElementById('quiz-area').style.display = '';
  document.getElementById('chip-round').textContent = `Runde ${roundNum}`;
  updateScoreBar();
  renderQ();
}

function nextRound(){
  roundNum++;
  startRound();
}

function updateScoreBar(){
  document.getElementById('chip-ok').textContent = `✅ ${correctCount}`;
  document.getElementById('chip-bad').textContent = `❌ ${wrongCount}`;
  document.getElementById('chip-round').textContent = `Runde ${roundNum}`;
}

function updateProgress(){
  const total = roundCards.length;
  const done = qi;
  const pct = Math.round((done/total)*100);
  document.getElementById('prog-text').textContent = `Frage ${done+1} von ${total}`;
  document.getElementById('prog-pct').textContent = `${pct}%`;
  document.getElementById('prog-fill').style.width = pct+'%';
}

function renderQ(){
  if(qi >= roundCards.length){ showResult(); return; }
  rfAnswered = false;
  answered = false;
  const q = roundCards[qi];
  updateProgress();

  const area = document.getElementById('quiz-area');
  area.innerHTML = `
    <div class="question-card" id="q-card">
      <div class="q-meta">
        <span class="q-num">Nr. ${q.nr}</span>
      </div>
      <div class="q-topic">${q.topic}</div>

      <div style="margin-top:22px;">
        <div class="step-label">Schritt 1 — Richtig oder Falsch?</div>
        <div class="rf-row">
          <button class="rf-btn btn-r" id="btn-r" onclick="pickRF('R')">
            <span class="icon">✅</span>
            <span class="lbl">Richtig</span>
          </button>
          <button class="rf-btn btn-f" id="btn-f" onclick="pickRF('F')">
            <span class="icon">❌</span>
            <span class="lbl">Falsch</span>
          </button>
        </div>
      </div>

      <div class="step2" id="step2">
        <div class="step-label" style="margin-top:20px;">Schritt 2 — Was ist die Antwort?</div>
        <div class="options-grid" id="opt-grid"></div>
      </div>

      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="goNext()">Nächste Frage →</button>
    </div>
  `;
}

function pickRF(chosen){
  if(rfAnswered) return;
  rfAnswered = true;
  const q = roundCards[qi];
  const btnR = document.getElementById('btn-r');
  const btnF = document.getElementById('btn-f');
  btnR.disabled = true;
  btnF.disabled = true;

  rfCorrect = (chosen === q.type);

  if(rfCorrect){
    const picked = chosen==='R' ? btnR : btnF;
    picked.classList.add('selected-correct');
    // show step 2
    showStep2();
  } else {
    // wrong RF — mark wrong, show correct, end question
    const picked = chosen==='R' ? btnR : btnF;
    const correct = q.type==='R' ? btnR : btnF;
    picked.classList.add('selected-wrong');
    correct.classList.add('selected-correct');
    wrongCount++;
    updateScoreBar();
    showFeedback(false, `❌ Falsch! Es ist "${q.type==='R'?'Richtig':'Falsch'}" — Antwort: ${q.answer}`);
    showNextBtn();
  }
}

function showStep2(){
  const q = roundCards[qi];
  const step2 = document.getElementById('step2');
  step2.classList.add('visible');

  // build 4 options
  const wrong = shuffle(ALL.filter(c => c.answer !== q.answer));
  const opts = shuffle([q.answer, ...wrong.slice(0,3).map(c=>c.answer)]);

  const grid = document.getElementById('opt-grid');
  grid.innerHTML = '';
  opts.forEach(opt => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.textContent = opt;
    b.onclick = () => pickAnswer(b, opt, q.answer);
    grid.appendChild(b);
  });
}

function pickAnswer(btn, chosen, correct){
  if(answered) return;
  answered = true;
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct) b.classList.add('correct');
  });
  if(chosen===correct){
    btn.classList.add('correct');
    correctCount++;
    updateScoreBar();
    showFeedback(true,'✅ Richtig! Sehr gut!');
  } else {
    btn.classList.add('wrong');
    wrongCount++;
    updateScoreBar();
    showFeedback(false,`❌ Falsch! Richtige Antwort: ${correct}`);
  }
  showNextBtn();
}

function showFeedback(ok, msg){
  const fb = document.getElementById('feedback');
  fb.textContent = msg;
  fb.className = 'feedback ' + (ok ? 'fb-ok' : 'fb-bad');
}

function showNextBtn(){
  const nb = document.getElementById('next-btn');
  nb.classList.add('vis');
  if(qi === roundCards.length-1){
    nb.textContent = 'Ergebnis anzeigen 🏁';
  }
}

function goNext(){
  qi++;
  renderQ();
}

function showResult(){
  document.getElementById('quiz-area').style.display='none';
  const total = roundCards.length;
  const pct = Math.round((correctCount/total)*100);
  const icons = pct>=90?'🏆':pct>=70?'🎉':pct>=50?'👍':'💪';
  document.getElementById('res-icon').textContent=icons;
  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('res-sub').textContent=`Du hast ${correctCount} von ${total} Fragen richtig beantwortet.`;
  document.getElementById('result').classList.add('vis');
  document.getElementById('prog-fill').style.width='100%';
  document.getElementById('prog-text').textContent=`Runde ${roundNum} abgeschlossen`;
  document.getElementById('prog-pct').textContent='100%';
}

// START
startRound();
</script>
</body>
</html>
