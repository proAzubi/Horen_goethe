<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ec;
    --red: #c0392b;

    background: var(--cream);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 10px 60px;
  }
  header { text-align: center; margin-bottom: 28px; animation: fadeDown .7s ease both; }
  header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.5rem,5vw,2.4rem); color: var(--dark); }
  header p { color: #666; font-size: .93rem; margin-top: 6px; }
  .flag { font-size: 2rem; margin-bottom: 6px; }

  .tabs {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 28px; animation: fadeUp .5s .2s ease both;
  }
  .tab {
    padding: 8px 18px; border-radius: 30px; border: 2px solid var(--dark);
    background: transparent; color: var(--dark); font-family: 'Cairo', sans-serif;
    font-size: .88rem; font-weight: 700; cursor: pointer; transition: all .2s;
  }
  .tab.active, .tab:hover { background: var(--dark); color: var(--cream); }

  /* ========== FLASHCARD ========== */
  #flashcard-section { width:100%; max-width:540px; animation: fadeUp .5s ease both; }
  .progress-bar-wrap { background:#e0d9cf; border-radius:10px; height:7px; margin-bottom:16px; overflow:hidden; }
  .progress-bar { height:100%; background:linear-gradient(90deg,var(--red),var(--gold)); border-radius:10px; transition:width .4s ease; }

  .flashcard-container { perspective:1200px; min-height:360px; margin-bottom:18px; cursor:pointer; }
  .flashcard { width:100%; height:100%; min-height:360px; position:relative; transform-style:preserve-3d; transition:transform .6s cubic-bezier(.4,0,.2,1); }
  .flashcard.flipped { transform: rotateY(180deg); }
  .card-face {
    position:absolute; inset:0; min-height:360px; border-radius:22px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:28px 26px; backface-visibility:hidden; box-shadow:var(--shadow);
  }
  .card-front { background:var(--dark); color:var(--cream); }
  .card-back { background:var(--card-bg); color:var(--dark); transform:rotateY(180deg); border:2.5px solid var(--gold); }
  .card-category-badge {
    position:absolute; top:14px; left:14px; background:var(--gold);
    color:var(--dark); border-radius:20px; padding:3px 12px; font-size:.72rem; font-weight:700;
  }
  .card-label { font-size:.72rem; letter-spacing:2px; text-transform:uppercase; opacity:.45; margin-bottom:10px; }
  .card-word { font-size:clamp(1.5rem,4vw,2.1rem); font-weight:700; text-align:center; margin-bottom:10px; }
  .card-sentence {
    font-size:.88rem; text-align:center; line-height:1.7; opacity:.85;
    background:rgba(255,255,255,.08); border-radius:10px; padding:10px 14px; margin-top:4px;
  }
  .card-back .card-sentence { background:#f5efe4; }
  .card-tap { font-size:.75rem; opacity:.35; margin-top:16px; }
  .card-nav { display:flex; gap:12px; justify-content:center; align-items:center; margin-bottom:12px; }
  .nav-btn {
    width:48px; height:48px; border-radius:50%; border:2px solid var(--dark);
    background:transparent; color:var(--dark); font-size:1.3rem; cursor:pointer; transition:all .18s;
    display:flex; align-items:center; justify-content:center;
  }
  .nav-btn:hover { background:var(--dark); color:var(--cream); }
  .card-counter { font-weight:700; color:#888; font-size:.9rem; min-width:60px; text-align:center; }

  /* ========== QUIZ ========== */
  #quiz-section { width:100%; max-width:540px; display:none; animation: fadeUp .5s ease both; }
  .quiz-score { text-align:center; font-size:1rem; color:#555; margin-bottom:14px; }
  .quiz-question {
    background:var(--dark); color:var(--cream); border-radius:18px;
    padding:24px; margin-bottom:18px; box-shadow:var(--shadow); text-align:center;
  }
  .quiz-question .q-label { font-size:.72rem; letter-spacing:2px; opacity:.45; margin-bottom:8px; }
  .quiz-question .q-word { font-size:clamp(1.3rem,4vw,1.9rem); font-weight:700; margin-bottom:10px; }
  .quiz-question .q-sentence { font-size:.85rem; opacity:.7; font-style:italic; line-height:1.6; }
  .quiz-options { display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-bottom:18px; }
  .quiz-opt {
    background:var(--card-bg); border:2px solid #e0d9cf; border-radius:14px;
    padding:13px 10px; font-family:'Cairo',sans-serif; font-size:.88rem; font-weight:600;
    color:var(--dark); cursor:pointer; transition:all .18s; text-align:center;
  }
  .quiz-opt:hover { border-color:var(--dark); background:#f5efe4; }
  .quiz-opt.correct { background:#d5f5e3; border-color:var(--green); color:var(--green); }
  .quiz-opt.wrong { background:#fde8e8; border-color:var(--red); color:var(--red); }

  /* ========== LIST ========== */
  #list-section { width:100%; max-width:580px; display:none; animation: fadeUp .5s ease both; }
  .list-category { margin-bottom:24px; }
  .list-cat-title { font-size:1rem; font-weight:700; color:var(--red); border-bottom:2px solid var(--gold); padding-bottom:6px; margin-bottom:12px; }
  .list-item {
    background:var(--card-bg); border-radius:14px; padding:14px 18px;
    margin-bottom:10px; box-shadow:0 2px 10px rgba(0,0,0,.07);
  }
  .list-de { font-weight:700; color:var(--dark); font-size:1rem; margin-bottom:4px; }
  .list-ar { color:#444; font-size:.9rem; margin-bottom:6px; }
  .list-example { font-size:.83rem; color:#888; font-style:italic; border-right:3px solid var(--gold); padding-right:10px; line-height:1.6; }

  /* ========== INTERVIEW ========== */
  #interview-section { width:100%; max-width:600px; display:none; animation: fadeUp .5s ease both; }
  #interview-section h3 { text-align:center; margin-bottom:22px; color:var(--dark); font-size:1.2rem; }
  .interview-card {
    background:var(--card-bg); border-radius:18px; padding:22px;
    margin-bottom:18px; box-shadow:var(--shadow); border-right:5px solid var(--gold);
  }
  .interview-badge {
    font-size:.72rem; background:var(--dark); color:var(--cream);
    border-radius:20px; padding:3px 12px; margin-bottom:12px; display:inline-block;
  }
  .interview-q-de { font-weight:700; color:var(--dark); font-size:1rem; margin-bottom:8px; }
  .interview-q-ar { color:#888; font-size:.85rem; margin-bottom:14px; }
  .interview-a-de {
    background:#f5efe4; border-radius:12px; padding:13px 16px;
    font-size:.9rem; line-height:1.8; color:#222; margin-bottom:8px; font-style:italic;
  }
  .interview-a-ar { color:#777; font-size:.83rem; line-height:1.7; }
  .interview-tip {
    background:#eafaf1; border-radius:10px; padding:10px 14px;
    font-size:.82rem; color:#27ae60; margin-top:10px; border-right:3px solid var(--green);
  }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-22px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.04)} 100%{transform:scale(1)} }
  .pop { animation: pop .3s ease; }
</style>
</head>

<header>

  <div class="card-nav">

<div id="list-section"></div>

let currentIndex = 0;
let isFlipped = false;

function updateCard() {
  const v = vocab[currentIndex];
  document.getElementById('fc-de').textContent = v.de;
  document.getElementById('fc-ar').textContent = v.ar;
  document.getElementById('fc-sentence-de').textContent = v.sentence_de;
  document.getElementById('fc-sentence-ar').textContent = v.sentence_ar;
  document.getElementById('fc-category').textContent = v.cat;
  document.getElementById('fc-counter').textContent = `${currentIndex+1} / ${vocab.length}`;
  document.getElementById('progress-bar').style.width = `${((currentIndex+1)/vocab.length)*100}%`;
  const fc = document.getElementById('flashcard');
  fc.classList.remove('flipped'); isFlipped = false;
  fc.classList.add('pop'); setTimeout(() => fc.classList.remove('pop'), 300);
}
function flipCard() {
  const fc = document.getElementById('flashcard');
  isFlipped = !isFlipped; fc.classList.toggle('flipped', isFlipped);
}
function nextCard() { currentIndex = (currentIndex+1) % vocab.length; updateCard(); }
function prevCard() { currentIndex = (currentIndex-1+vocab.length) % vocab.length; updateCard(); }

// QUIZ
let quizShuffled = [], quizIndex = 0, quizScore = 0;
function startQuiz() {
  quizShuffled = [...vocab].sort(() => Math.random()-.5);
  quizIndex = 0; quizScore = 0;
  document.getElementById('quiz-score').textContent = 0;
  document.getElementById('quiz-total').textContent = vocab.length;
  showQuizQuestion();
}
function showQuizQuestion() {
  if (quizIndex >= quizShuffled.length) { quizIndex = 0; quizShuffled.sort(() => Math.random()-.5); }
  const v = quizShuffled[quizIndex];
  document.getElementById('quiz-word').textContent = v.de;
  document.getElementById('quiz-sentence').textContent = v.sentence_de;
  let opts = [v].concat([...vocab].filter(x=>x.de!==v.de).sort(()=>Math.random()-.5).slice(0,3)).sort(()=>Math.random()-.5);
  const container = document.getElementById('quiz-options'); container.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button'); btn.className = 'quiz-opt';
    btn.textContent = opt.ar;
    btn.onclick = () => {
      const correct = opt.de === v.de;
      btn.classList.add(correct ? 'correct' : 'wrong');
      if (correct) { quizScore++; document.getElementById('quiz-score').textContent = quizScore; }
      else container.querySelectorAll('.quiz-opt').forEach(b => { if(b.textContent===v.ar) b.classList.add('correct'); });
      container.querySelectorAll('.quiz-opt').forEach(b => b.disabled=true);
      setTimeout(() => { quizIndex++; showQuizQuestion(); }, 1300);
    };
    container.appendChild(btn);
  });
}

// LIST
function buildList() {
  const section = document.getElementById('list-section'); section.innerHTML = '';
  const cats = [...new Set(vocab.map(v=>v.cat))];
  cats.forEach(cat => {
    const div = document.createElement('div'); div.className = 'list-category';
    div.innerHTML = `<div class="list-cat-title">${cat}</div>`;
    vocab.filter(v=>v.cat===cat).forEach(v => {
      div.innerHTML += `<div class="list-item">
        <div class="list-de">${v.de}</div>
        <div class="list-ar">${v.ar}</div>
        <div class="list-example">${v.sentence_de}<br><span style="color:#aaa">${v.sentence_ar}</span></div>
      </div>`;
    });
    section.appendChild(div);
  });
}

// INTERVIEW
function buildInterview() {
  const section = document.getElementById('interview-section');
  section.innerHTML = '<h3>🎤 أسئلة المقابلة الكاملة — Vorstellungsgespräch</h3>';
  interviewData.forEach(p => {
    section.innerHTML += `<div class="interview-card">
      <span class="interview-badge">${p.badge}</span>
      <div class="interview-q-de">🇩🇪 ${p.q_de}</div>
      <div class="interview-q-ar">🇲🇦 ${p.q_ar}</div>
      <div class="interview-a-de">${p.a_de.replace(/\n\n/g,'<br><br>')}</div>
      <div class="interview-a-ar">${p.a_ar.replace(/\n\n/g,'<br><br>')}</div>
      <div class="interview-tip">${p.tip}</div>
    </div>`;
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tabs = ['flashcard','quiz','list','interview'];
  document.querySelectorAll('.tab')[tabs.indexOf(tab)].classList.add('active');
  ['flashcard-section','quiz-section','list-section','interview-section'].forEach(id => document.getElementById(id).style.display='none');
  if (tab==='flashcard') { document.getElementById('flashcard-section').style.display='block'; }
  else if (tab==='quiz') { document.getElementById('quiz-section').style.display='block'; startQuiz(); }
  else if (tab==='list') { document.getElementById('list-section').style.display='block'; buildList(); }
  else if (tab==='interview') { document.getElementById('interview-section').style.display='block'; buildInterview(); }
}

updateCard();
</script>
